services:
  db:
    image: postgres:17
    ports:
      - 5432:5432
    networks:
      - lakefs
    environment:
      POSTGRES_DB: lakefs
      POSTGRES_USER: lakefs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  
  minio:
    image: minio/minio:RELEASE.2022-04-12T06-55-35Z
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address ':9001' --address ':9000'
    networks:
      - lakefs
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_HTTP_TRACE: /dev/stdout
      MINIO_DOMAIN: minio:9000
    volumes:
      - ./data/minio:/data

    lakefs:
      image: treeverse/lakefs:1.30.0
      ports:
        - 8000:8000
      networks:
        - lakefs
      environment:
        LAKEFS_DATABASE_TYPE: "postgres"
        LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: ${LKEFS_DATABASE_POSTGRES_CONNECTION_STRING}
        LAKEFS_AUTH_ENCRYPT_SECRET_KEY: ${LAKEFS_AUTH_ENCRYPT_SECRET_KEY}
        LAKEFS_BLOCKSTORE_TYPE: "s3"
        LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: "true"
        LAKEFS_BLOCKSTORE_S3_ENDPOINT: "http://minio:9000"
        LAKEFS_BLOCKSTORE_S3_DISCOVER_BUCKET_REGION: "false"
        LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
        LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

networks:
  lakefs: